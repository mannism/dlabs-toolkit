name: "@diabolicallabs/notion"
purpose: >
  Notion REST API client wrapping @notionhq/client v5. Handles authentication,
  Notion-Version header pinning (2025-09-03), property serialization for all
  common property types, conflict_error retry with full-jitter exponential
  backoff, and structured error taxonomy. Authorization headers are stripped
  from error logs — no secret leakage.
owner: Sable
status: stable

depends_on:
  - name: "@notionhq/client ^5.22.0"
    why: "Official Notion SDK. v5 uses dataSources.query (not databases.query) and default Notion-Version 2025-09-03."

depended_on_by:
  - name: "usage-parser"
    how: "Migration target — replaces raw fetch calls against Notion REST API in writeToNotion()"
  - name: "Knowledge Pipeline"
    how: "Uses Notion writes for digest storage. Will migrate to @diabolicallabs/notion post-Week 5."
  - name: "Agent Spend Dashboard"
    how: "May use for auxiliary Notion integrations (command center writes)"

exports:
  - "createNotionClient(config: NotionClientConfig): NotionClient"
  - "createNotionClientFromEnv(overrides?): NotionClient"
  - "setNotionLogger(logger: Logger): void"
  - "Types: NotionClientConfig, NotionPropertyValue, NotionProperties, NotionPage, NotionClient, Logger"
  - "Errors: NotionError, NotionAuthError, NotionNotFoundError, NotionValidationError, NotionRateLimitError, NotionConflictError, NotionUnavailableError"

contracts:
  notion_version: "2025-09-03 — aligned with @notionhq/client v5 default."
  rate_limit:
    strategy: "SDK handles 429 retries. NotionRateLimitError thrown after maxRetries exhausted."
  conflict_error:
    strategy: "Retry with full-jitter exponential backoff. Common on concurrent writes."
    max_retries_default: 3
    base_delay_ms_default: 500
  secret_safety: "Authorization header stripped from all error logs. apiKey never logged."

failure_modes:
  - trigger: "Notion conflict_error (concurrent write)"
    impact: "Retried automatically. Transparent to caller."
    propagation: "silent if retried successfully; NotionConflictError after max_retries exhausted"
  - trigger: "HTTP 429 from Notion (rate limited)"
    impact: "Retried after backoff. Transparent to caller."
    propagation: "silent if retried successfully; NotionRateLimitError after max_retries exhausted"
  - trigger: "Invalid API key (HTTP 401)"
    impact: "Throws NotionAuthError immediately, no retry."
    propagation: "propagated"
  - trigger: "Resource not found (HTTP 404)"
    impact: "Throws NotionNotFoundError immediately."
    propagation: "propagated"
  - trigger: "NOTION_API_KEY env var absent"
    impact: "createNotionClientFromEnv throws NotionValidationError synchronously at call site."
    propagation: "propagated"

performance:
  expected_latency: "Notion API p50 ~200-400ms per request. Conflict retry adds delay on concurrent batch operations."
  notes: "Not suitable for latency-sensitive synchronous paths. Background/async usage pattern recommended."

notes: |
  v1.0.0: full implementation ships Week 5. Uses @notionhq/client v5 SDK
  (dataSources.query, Notion-Version 2025-09-03). Serializes 12 property types.
  64 unit tests, 85%+ branch coverage. Integration test suite gated by NOTION_API_KEY.
