name: "@diabolicallabs/notion"
purpose: >
  Notion REST API helpers. Handles the repetitive parts of the Notion API:
  authentication headers, Notion-Version header pinning, property serialisation
  for all common property types, conflict_error retry (common on concurrent
  page writes), and the 3-req/s rate-limit backoff. Wraps the REST API
  directly — not the official Notion SDK — for precise control.
owner: Sable
status: scaffolded

depends_on:
  - name: "Notion REST API (v1, 2022-06-28)"
    why: "Wraps directly via fetch. Version pinned for stability."

depended_on_by:
  - name: "usage-parser"
    how: "Migration target — replaces raw fetch calls against Notion REST API in writeToNotion()"
  - name: "Knowledge Pipeline"
    how: "Uses Notion writes for digest storage. Will migrate to @diabolicallabs/notion post-Week 5."
  - name: "Agent Spend Dashboard"
    how: "May use for auxiliary Notion integrations (command center writes)"

exports:
  - "createNotionClient(config: NotionClientConfig): NotionClient"
  - "createNotionClientFromEnv(overrides?): NotionClient"
  - "Types: NotionClientConfig, NotionPropertyValue, NotionProperties, NotionPage, NotionClient"

contracts:
  notion_version: "2022-06-28 — pinned. Backwards-compatible within v1."
  rate_limit:
    strategy: "Notion enforces ~3 req/s average. SDK adds 333ms delay between consecutive requests when rate-limited (HTTP 429 from Notion)."
  conflict_error:
    strategy: "Retry with exponential backoff. Common on concurrent writes to the same page in batch operations."
    max_retries_default: 3
    base_delay_ms_default: 500

failure_modes:
  - trigger: "Notion API conflict_error (concurrent write)"
    impact: "Retried automatically. Transparent to caller."
    propagation: "silent if retried successfully; propagated after max_retries exhausted"
  - trigger: "HTTP 429 from Notion (rate limited)"
    impact: "Retried after delay. Transparent to caller."
    propagation: "silent if retried successfully; propagated after max_retries exhausted"
  - trigger: "Invalid API key (HTTP 401)"
    impact: "Throws immediately, no retry."
    propagation: "propagated"

performance:
  expected_latency: "Notion API p50 ~200-400ms per request. Rate-limit backoff adds delay on sustained batch operations."
  notes: "Not suitable for latency-sensitive paths. Background/async usage pattern recommended for batch writes."

notes: |
  Status 'scaffolded': types and factory stubs are in place; implementation
  ships Week 5. Wraps Notion REST API directly — not the @notionhq/client SDK
  — for control over version header and retry logic.
  Acceptance gate: usage-parser writeToNotion() can be reimplemented using
  this package with no behaviour change.
