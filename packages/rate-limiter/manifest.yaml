name: "@diabolicallabs/rate-limiter"
purpose: >
  Redis sliding-window rate limiter using a Lua EVAL/EVALSHA atomic script.
  The sorted-set algorithm (ZREMRANGEBYSCORE + ZCARD + conditional ZADD +
  EXPIRE, all in a single Lua call) prevents race conditions that MULTI/EXEC
  cannot. SHA pre-warmed at construction via SCRIPT LOAD; NOSCRIPT fallback
  to EVAL + SHA reload on Redis cache flush. Structural RedisExecutor interface
  — caller provides any Redis client with eval/evalsha/scriptLoad.
owner: Sable
status: stable

depends_on:
  - name: "ioredis (peerDependency, optional)"
    why: "Structural RedisExecutor interface is satisfied by ioredis Redis instance. Listed as peerDep so consumers provide their existing singleton — no duplicate Redis connections."
  - name: "Redis"
    why: "Sorted set per key, server-side TIME for authoritative clock. Lua atomicity requires Redis 2.6+."

depended_on_by:
  - name: "FitChecker"
    how: "Replaces lib/redis.ts + inline sorted-set rate limiting on API routes"
  - name: "GEOAudit"
    how: "Ingestion endpoint will require rate limiting once Agent Spend Dashboard ships"
  - name: "Agent Spend Dashboard"
    how: "/api/ingest endpoint requires IP-based rate limiting on the public ingestion surface"

exports:
  - "createRateLimiter(config: RateLimiterConfig): RateLimiter"
  - "setRateLimiterLogger(logger: Logger): void"
  - "RateLimitError (class) — kind: 'exceeded' | 'unavailable'"
  - "Types: RateLimiterConfig, RateLimitResult, RateLimiter, RedisExecutor, Logger"

contracts:
  algorithm: "sliding window via Redis sorted set, Lua EVAL atomic"
  lua_ops: ["TIME", "ZREMRANGEBYSCORE", "ZCARD", "ZADD", "EXPIRE"]
  atomicity: "single Lua script — no interleaving between concurrent clients"
  evalsha_optimization: "SHA pre-warmed at construction; NOSCRIPT falls back to EVAL + SHA reload"
  fail_policy:
    default: "closed — Redis error → request blocked (kind: unavailable)"
    override: "onRedisError: 'open' → request allowed, RL_REDIS_ERROR logged"

failure_modes:
  - trigger: "Redis unreachable"
    impact: "check() returns { allowed: false, kind: unavailable }. enforce() throws RateLimitError."
    propagation: "fail-closed by default; fail-open if onRedisError: 'open'"
  - trigger: "Redis script cache flushed (NOSCRIPT)"
    impact: "Automatic fallback to EVAL + SHA reload. Transparent to caller."
    propagation: "silent — one extra round-trip"
  - trigger: "Rate limit exceeded"
    impact: "check() returns { allowed: false, remaining: 0, resetMs: N }. enforce() throws RateLimitError."
    propagation: "propagated — caller receives RateLimitError with kind: 'exceeded'"

performance:
  expected_latency: "~1-2ms per check (Redis RTT on same host/LAN). One Lua call per check."
  notes: "Do not call check() in a hot loop — one check per request, at the request boundary."

notes: |
  v1.0.0: full implementation ships Week 5. Uses Lua EVAL/EVALSHA for
  atomicity (not MULTI/EXEC). RedisExecutor is a structural interface — no
  hard ioredis type import. 40 unit tests, 89%+ branch coverage.
  Integration test suite gated by REDIS_URL.
