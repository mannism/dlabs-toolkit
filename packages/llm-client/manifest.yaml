name: "@diabolicallabs/llm-client"
purpose: >
  Unified LLM API across Anthropic, OpenAI, Gemini, DeepSeek, and Perplexity.
  Provides a single LlmClient interface with streaming, non-streaming, and
  structured output (Zod-validated). Handles retry with exponential backoff +
  full jitter, error normalization into LlmError, and token usage normalization
  into a consistent LlmUsage shape regardless of provider.
  Perplexity provider adds web-grounded responses with citation extraction,
  deduplication, and providerOptions escape hatch for search filters.
  v0.3.0 adds per-call timeout overrides, caller AbortSignal support,
  stream stall detection (withStallTimeout), and LlmError.kind discriminator.
  All five providers fully implemented as of v0.2.0; all cancellation features
  wired across all five as of v0.3.0.
owner: Sable
status: published

depends_on:
  - name: "@anthropic-ai/sdk"
    why: "Anthropic Claude provider — Week 2 implementation"
  - name: "openai"
    why: "OpenAI provider — Week 2 implementation"
  - name: "zod"
    why: "Structured output schema validation. Used in structured() to parse and validate JSON responses."
  - name: "@google/genai"
    why: "Google Gemini provider — Week 3 implementation"
  - name: "deepseek (fetch-based)"
    why: "DeepSeek provider — Week 3 implementation. DeepSeek's API is OpenAI-compatible; uses the openai SDK with a base URL override."
  - name: "perplexity (fetch-based)"
    why: "Perplexity provider — fully implemented in Week 5. OpenAI SDK with baseURL override pointing at https://api.perplexity.ai. Returns web-grounded responses with citation URLs."

depended_on_by:
  - name: "@diabolicallabs/agent-sdk"
    how: "agent-sdk wraps LlmClient via instrumentClient() to intercept all calls for cost tracking. LlmClient is a peer dep of agent-sdk, not bundled."
  - name: "GEOAudit"
    how: "Pilot migration in Week 6 — replaces callLLM() in server.js"
  - name: "FitChecker"
    how: "Migration in post-Week 6 backlog — replaces lib/llm/providers/openai-provider.ts"
  - name: "Agent Spend Dashboard"
    how: "Born-in-toolkit consumer — installs @diabolicallabs/agent-sdk@next which wraps llm-client"

exports:
  - "createClient(config: LlmClientConfig): LlmClient"
  - "createClientFromEnv(provider, model, overrides?): LlmClient"
  - "LlmError (class)"
  - "Types: LlmMessage, LlmClientConfig, LlmCallOptions, LlmUsage, LlmResponse, LlmStreamChunk, LlmStructuredResponse, LlmClient"

contracts:
  retry:
    strategy: "exponential backoff with full jitter"
    formula: "delay = random(0, baseDelayMs * 2^attempt)"
    retryable_conditions: ["HTTP 429", "HTTP 502", "HTTP 503", "HTTP 504", "ECONNRESET", "ETIMEDOUT", "timeout"]
    non_retryable_conditions: ["HTTP 400", "HTTP 401", "HTTP 403", "HTTP 404", "cancelled", "stream_stall"]
    max_retries_default: 3
  timeout_default_ms: 30000
  cancellation:
    per_call_timeout: "LlmCallOptions.timeoutMs overrides config.timeoutMs per attempt"
    caller_signal: "LlmCallOptions.signal — pre-abort throws immediately; mid-call abort kind:'cancelled', not retried"
    stream_stall: "LlmCallOptions.streamStallTimeoutMs (default 30000ms) — fires per chunk, resets on each yield"
    gemini_caveat: "Promise.race only — SDK HTTP request not cancelled. Backstop: httpOptions.timeout = configMs * 2"

failure_modes:
  - trigger: "All retries exhausted"
    impact: "Throws LlmError with retryable: false"
    propagation: "propagated — caller must handle"
  - trigger: "Provider API key invalid (HTTP 401/403)"
    impact: "Throws LlmError immediately, no retry"
    propagation: "propagated — caller must handle"
  - trigger: "Per-call timeout fires"
    impact: "Throws LlmError kind:'timeout', retryable:true. Each retry gets a fresh deadline."
    propagation: "propagated after all retries exhausted"
  - trigger: "Caller signal aborted"
    impact: "Throws LlmError kind:'cancelled', retryable:false. Never retried."
    propagation: "propagated immediately"
  - trigger: "Stream stall (no chunk within streamStallTimeoutMs)"
    impact: "Throws LlmError kind:'stream_stall', retryable:true. Stream is never retried mid-stream."
    propagation: "propagated — partial output is lost, caller must decide recovery"
  - trigger: "Provider SDK breaking change"
    impact: "Build failure in @diabolicallabs/llm-client; other packages unaffected"
    propagation: "contained to this package"

performance:
  expected_latency: "Passthrough to provider — no overhead beyond retry logic"
  notes: "Token counting is done from the provider response, not via tiktoken. No sync-heavy computation."

notes: |
  Week 2 shipped: Anthropic + OpenAI providers, retry, structured output, 80%+ test coverage.
  Week 3 shipped: Gemini (via @google/genai SDK) + DeepSeek (OpenAI SDK with baseURL override).
  Week 5 shipped: Perplexity (OpenAI SDK with baseURL override at api.perplexity.ai).
    - Citations: extracted from Perplexity citations[] string array, mapped to {url}, deduped by URL.
    - providerOptions escape hatch: search_recency_filter, search_domain_filter, unknown fields pass-through.
    - Reasoning: sonar-reasoning-pro supported; structured() strips <think> blocks before JSON parse.
    - sonar-deep-research: treated as synchronous model; not verified live (may require async polling).
  Week 6 shipped: per-call timeout, AbortSignal, stream stall detection (v0.3.0).
    - abort.ts (new): createAttemptController, cancellableSleep, withStallTimeout, classifyAbort.
    - LlmError.kind discriminator: cancelled | timeout | stream_stall | http | network | unknown.
    - All 5 providers wired. Gemini uses Promise.race (no native SDK signal); 2x backstop on httpOptions.timeout.
    - 243 unit tests (was 202). Typecheck and build clean.
  Provider SDKs are devDependencies — bundled into dist at build time via tsup.
  Consumers do not need to install provider SDKs directly.
  All five providers fully implemented as of v0.2.0; all cancellation features wired as of v0.3.0.
