name: "@diabolicallabs/llm-client"
version: "1.7.0"
purpose: >
  Unified LLM client across 5 providers: OpenAI (Responses API), Anthropic, Gemini
  (@google/genai v2.x), DeepSeek, and Perplexity. Provides a single LlmClient interface
  with complete(), stream(), structured(), withTools(), and streamStructured() (v1.3.0+).
  Error normalization into 14-kind LlmError taxonomy with retryability and status-code
  classification. Token usage normalization into consistent LlmUsage shape regardless of
  provider. Configurable retry with 4 strategies (exponential, linear, fixed, none).
  Provider failover via model: string[] — tries each model in order on configured error kinds.
  Optional cost tracking via @diabolicallabs/llm-pricing peer dep (LlmClientConfig.pricing).
  Strict structured outputs: OpenAI json_schema, Anthropic tool-use, Gemini responseSchema,
  DeepSeek/Perplexity prompt-fallback. Per-call timeout, AbortSignal, stream stall detection.
  Optional semaphore + rate-limiter via @diabolicallabs/llm-client/pool sub-path (v1.2.0+).
  v1.4.0 additions: capability matrix (getModelCapabilities), linkedAbortController fan-out
  helper, and response IDs (id + idSource) on all three response types.
  v1.5.0 additions: pre-call hooks API (LlmHooks) — beforeCall (mutation + short-circuit)
  and afterCall (informational) on all 5 call types. Hooks fire once per public method
  invocation, not per retry. beforeCall errors propagate as bad_request; afterCall errors
  are logged and dropped. Streaming paths fire afterCall after generator exhaustion;
  ctx.response is undefined for streaming (no buffered response object).
  v1.6.0 additions: LlmAfterCallContext.usage populated for all 5 call types including
  streaming — stream() captures from terminal chunk, streamStructured() from done event.
  v1.7.0 additions: pricing.remoteUrl + pricing.cacheTtlMs on LlmClientConfig — wire
  fetchRemoteTable() for live pricing with stale-while-revalidate cache (24h TTL default,
  never-throws). createClient() and createClientFromEnv() are now async (Promise<LlmClient>).
  Structured log event pricing_source emitted on init.
owner: Sable
status: published

depends_on:
  - name: "@anthropic-ai/sdk"
    version: "^0.95.2"
    why: "Anthropic Claude provider — messages API with streaming and prompt cache support"
  - name: "openai"
    version: "^6.37.0"
    why: "OpenAI Responses API provider; also used by DeepSeek and Perplexity with baseURL override"
  - name: "zod"
    why: "Structured output schema validation. Used in structured() and streamStructured() to parse and validate JSON responses."
  - name: "@google/genai"
    version: "^2.2.0"
    why: "Google Gemini provider — generateContent + streaming via v2.x SDK"
  - name: "deepseek (openai SDK with baseURL override)"
    why: "DeepSeek's API is OpenAI Chat Completions-compatible; uses the openai SDK pointed at api.deepseek.com"
  - name: "perplexity (openai SDK with baseURL override)"
    why: "Perplexity's API is OpenAI-compatible; uses the openai SDK pointed at api.perplexity.ai. Returns web-grounded responses with citation URLs."
  - name: "@diabolicallabs/llm-pricing"
    version: "^0.2.0"
    why: "Optional peer dep — enables per-call cost tracking (LlmClientConfig.pricing). v1.7.0+: pricing.remoteUrl wires fetchRemoteTable() for live pricing with stale-while-revalidate cache."

depended_on_by:
  - name: "@diabolicallabs/agent-sdk"
    how: "agent-sdk wraps LlmClient via instrumentClient() to intercept all calls for cost tracking. LlmClient is a peer dep of agent-sdk, not bundled."
  - name: "GEOAudit"
    how: "Live consumer — dynamic ESM import in api/server.js. All four providers (anthropic, openai, perplexity, gemini) active in production on caret range ^0.4.4 (auto-propagates on minor publishes)"
  - name: "FitChecker"
    how: "Migration in backlog — replaces lib/llm/providers/openai-provider.ts"
  - name: "Agent Spend Dashboard"
    how: "Born-in-toolkit consumer — installs @diabolicallabs/agent-sdk which wraps llm-client"

exports:
  - "createClient(config: LlmClientConfig): Promise<LlmClient>  — async as of v1.7.0"
  - "createClientFromEnv(provider, model, overrides?): Promise<LlmClient>  — async as of v1.7.0"
  - "LlmError (class)"
  - "LlmErrorKind (type) — 14-kind discriminated union"
  - "Types: LlmMessage, LlmClientConfig, LlmCallOptions, LlmUsage, LlmResponse, LlmStreamChunk, LlmStructuredResponse, LlmToolResponse, LlmClient, LlmCost"
  - "RetryConfig, RetryStrategy (types)"
  - "LlmCallType (type) — 'complete' | 'stream' | 'structured' | 'withTools' | 'streamStructured' (v1.5.0+)"
  - "LlmCallContext (type) — context object passed to beforeCall hooks: messages, options, provider, model, callType (v1.5.0+)"
  - "LlmBeforeCallResult (type) — return shape for beforeCall: { messages?, options?, skip? } (v1.5.0+)"
  - "LlmSkipResult (type) — named union for the skip field; all valid response shapes (v1.5.0+)"
  - "LlmAfterCallContext (type) — context passed to afterCall hooks: request, response, usage, error, latencyMs; usage populated for all 5 call types (v1.5.0+, usage field v1.6.0+)"
  - "LlmHooks (type) — { beforeCall?, afterCall? } interface; pass as hooks? on LlmClientConfig (v1.5.0+)"
  - "getModelCapabilities(provider, model): ModelCapabilities | null — provider capability lookup (v1.4.0+)"
  - "ModelCapabilities (type) — capability descriptor returned by getModelCapabilities"
  - "CAPABILITIES_VERSIONED_AT (constant) — ISO date of last capability table update"
  - "linkedAbortController(parentSignal, opts?): LinkedAbortHandle — fan-out AbortController with optional per-child timeout (v1.4.0+)"
  - "LinkedAbortHandle, LinkedAbortControllerOptions (types)"
  - "withTools() — native tool calling on LlmClient (all providers except Perplexity)"
  - "streamStructured() — async generator: streaming tokens + Zod-validated final output (v1.3.0+)"
  - "@diabolicallabs/llm-client/pool sub-path: createSemaphore, createRateLimiter (v1.2.0+)"

contracts:
  pricing_remote:
    config: "pricing.remoteUrl (string) — URL to fetch a PricingTable JSON. Optional. When omitted, bundled DEFAULT_PRICING_TABLE is used."
    cache_ttl: "pricing.cacheTtlMs (number) — cache TTL in ms. Default: 86400000 (24h). Override per-client."
    precedence: "pricing.table (explicit) > pricing.remoteUrl (remote fetch) > DEFAULT_PRICING_TABLE (bundled)."
    fail_safe: "Remote fetch failure falls back to DEFAULT_PRICING_TABLE silently. pricing_source log indicates actual source."
    init_log: "pricing_source structured log event emitted from createClient() on every init. Fields: event, source, url (when remote)."
    breaking_change: "createClient() and createClientFromEnv() return Promise<LlmClient> as of v1.7.0. All callers must await."
  retry:
    strategy: "exponential backoff with full jitter (default); also linear, fixed, none"
    formula: "delay = random(0, baseDelayMs * 2^attempt)"
    retryable_conditions: ["HTTP 429", "HTTP 502", "HTTP 503", "HTTP 504", "ECONNRESET", "ETIMEDOUT", "timeout"]
    non_retryable_conditions: ["HTTP 400", "HTTP 401", "HTTP 403", "HTTP 404", "cancelled", "stream_stall"]
    max_retries_default: 3
  timeout_default_ms: 30000
  cancellation:
    per_call_timeout: "LlmCallOptions.timeoutMs overrides config.timeoutMs per attempt"
    caller_signal: "LlmCallOptions.signal — pre-abort throws immediately; mid-call abort kind:'cancelled', not retried"
    stream_stall: "LlmCallOptions.streamStallTimeoutMs (default 30000ms) — fires per chunk, resets on each yield"
    gemini_caveat: "Promise.race only — SDK HTTP request not cancelled. Backstop: httpOptions.timeout = configMs * 2"
  response_ids:
    anthropic: "provider-issued message ID (response.id)"
    openai: "provider-issued response ID (rawResponse.id — Responses API)"
    deepseek: "provider-issued response ID (rawResponse.id — Chat Completions)"
    perplexity: "provider-issued response ID (response.id)"
    gemini: "toolkit-synthesized UUID v7-style (time-derived prefix + random) — Gemini does not issue native IDs"

failure_modes:
  - trigger: "All retries exhausted"
    impact: "Throws LlmError with retryable: false"
    propagation: "propagated — caller must handle"
  - trigger: "Provider API key invalid (HTTP 401/403)"
    impact: "Throws LlmError immediately, no retry"
    propagation: "propagated — caller must handle"
  - trigger: "Per-call timeout fires"
    impact: "Throws LlmError kind:'timeout', retryable:true. Each retry gets a fresh deadline."
    propagation: "propagated after all retries exhausted"
  - trigger: "Caller signal aborted"
    impact: "Throws LlmError kind:'cancelled', retryable:false. Never retried."
    propagation: "propagated immediately"
  - trigger: "Stream stall (no chunk within streamStallTimeoutMs)"
    impact: "Throws LlmError kind:'stream_stall', retryable:true. Stream is never retried mid-stream."
    propagation: "propagated — partial output is lost, caller must decide recovery"
  - trigger: "Provider SDK breaking change"
    impact: "Build failure in @diabolicallabs/llm-client; other packages unaffected"
    propagation: "contained to this package"
  - trigger: "Model failover — all models in array exhausted"
    impact: "Throws LlmError from the last attempted model"
    propagation: "propagated after all models tried"

performance:
  expected_latency: "Passthrough to provider — no overhead beyond retry logic"
  notes: "Token counting is done from the provider response, not via tiktoken. No sync-heavy computation."

notes: |
  v1.0.0: OpenAI Responses API migration; 14-kind LlmError taxonomy; withTools() for all providers.
  v1.1.0: Optional cost tracking via @diabolicallabs/llm-pricing peer dep.
  v1.2.0: Configurable retry strategies (4 modes); provider failover via model: string[];
          pool sub-path with semaphore + rate-limiter.
  v1.3.0: streamStructured() — async generator: streaming tokens + Zod-validated output.
          Supported providers: OpenAI, Anthropic, DeepSeek (JSON-mode accumulation).
  v1.4.0: getModelCapabilities() capability matrix; linkedAbortController fan-out helper;
          response IDs (id + idSource) on LlmResponse, LlmStructuredResponse, LlmToolResponse.
  v1.5.0: Pre-call hooks API (LlmHooks). beforeCall: mutation + short-circuit. afterCall:
          informational observer. Hooks fire once per method invocation, not per retry.
          wrapWithHooks() is the outermost layer in createClient's wrapping order.
  v1.6.0: LlmAfterCallContext.usage populated for all 5 call types, including streaming paths.
          stream() accumulates usage from the terminal chunk (the chunk that carries chunk.usage).
          streamStructured() captures usage from the done event. For non-streaming paths,
          usage mirrors the response directly. usage is undefined only when the call throws.
  v1.7.0: pricing.remoteUrl — wire fetchRemoteTable() into createClient(); stale-while-revalidate
          cache, 24h TTL, never-throws fail-safe. pricing.cacheTtlMs — override cache TTL.
          createClient() and createClientFromEnv() are now async (Promise<LlmClient>).
          Structured log event pricing_source emitted on init.
  Provider SDKs are devDependencies — bundled into dist at build time via tsup.
  Consumers do not need to install provider SDKs directly.
  Published to npmjs.com under @diabolicallabs scope. GEOAudit is the live pilot consumer.
