name: "@diabolicallabs/agent-sdk"
purpose: >
  Cost-tracking middleware that wraps @diabolicallabs/llm-client. Intercepts
  every LLM call to capture a CallRecord and dispatches it asynchronously
  (fire-and-forget) to the Agent Spend Dashboard ingestion API. The
  instrumentation is non-blocking — LLM response is returned to the caller
  before ingestion completes. Failed ingestion retries with exponential backoff,
  then drops and logs on exhaustion. Never affects the underlying LLM call.
  v1.1.0: cost propagation via @diabolicallabs/llm-pricing peer dep.
  v1.2.0: requestedModel tracking on provider failover.
  v1.3.0: streamStructured() usage capture (one CallRecord per call, from done event).
  v1.4.0: B1-hybrid internal refactor — non-streaming paths use shared buildAfterCallHandler()
  via llm-client hooks. Streaming paths retained bespoke generator wrappers.
  v2.0.0: architecture-migration complete — all 5 call types now route through a single
  buildAfterCallDispatch() function. Bespoke stream wrappers deleted. Requires
  llm-client@^1.6.0 (LlmAfterCallContext.usage populated for streaming paths).
  Public API is unchanged — instrumentClient() is the only entry point.
  v3.0.1: peer-dep cleanup — @diabolicallabs/llm-pricing removed from peerDependencies
  and peerDependenciesMeta. The only usage was type-only imports of LlmCost (compiled away
  at build time). LlmCost is now inlined in types.ts. Prevents Changesets peer-cascade
  major-bump on future llm-pricing pre-1.0 minor boundaries. No API change.
owner: Sable
status: published

depends_on:
  - name: "@diabolicallabs/llm-client"
    version: "^5.0.0"
    why: "Wraps LlmClient via instrumentClient(). v2.0.0 routes all 5 call types through
          a single buildAfterCallDispatch() function. v5.x is the current major track —
          agent-sdk@3.2.2 bumped the peer dep to ^5.0.0 when llm-client shipped LlmToolSchema
          (breaking tool inputSchema change). LlmAfterCallContext.usage is populated on all
          paths including streaming, which is what allows the unified dispatch to read usage
          from afterCall on stream/streamStructured. v5.1.0 adds the Files API and
          InstrumentedLlmClient exposes the files namespace passthrough."
  - name: "@diabolicallabs/llm-pricing"
    version: "devDependency only (workspace:*)"
    why: "Dev-only — used in tests and local type resolution. NOT a peer dep as of v3.0.1.
          LlmCost type is inlined in types.ts; no runtime dependency on llm-pricing."

depended_on_by:
  - name: "Agent Spend Dashboard"
    how: "Born-in-toolkit consumer — uses instrumentClient() to wrap its LLM calls and feed the /api/ingest endpoint"
  - name: "GEOAudit"
    how: "Week 6 migration — replaces pool.query INSERT INTO llm_usage fire-and-forget block"

exports:
  - "instrumentClient(client: LlmClient, config: AgentSdkConfig): InstrumentedLlmClient"
  - "Types: AgentIdentity, AgentSdkConfig, InstrumentedLlmClient, CallRecord"
  - "files namespace passthrough: InstrumentedLlmClient.files delegates to the underlying LlmClient.files (v3.2.3+)"

contracts:
  ingestion:
    pattern: "fire-and-forget — non-blocking, never delays the LLM response"
    max_retries_default: 3
    timeout_default_ms: 5000
    on_exhaustion: "drop record + structured warning log (includes call_id for audit)"
  disabled_mode:
    trigger: "config.disabled = true"
    behavior: "all instrumentation skipped — LlmClient passthrough only"
  unified_dispatch:
    note: >
      v2.0.0: all 5 call types (complete, stream, structured, streamStructured, withTools)
      route through a single buildAfterCallDispatch() function. No bespoke per-method
      stream wrappers remain. Usage for stream/streamStructured is populated by
      llm-client@1.6.0 on LlmAfterCallContext.usage, read uniformly in the dispatch fn.

failure_modes:
  - trigger: "Ingestion endpoint down"
    impact: "Record dispatched with retry. On exhaustion, dropped."
    propagation: "silent — LLM call is never affected"
  - trigger: "Ingestion retries exhausted"
    impact: "Record dropped. Structured warning log includes call_id for audit."
    propagation: "silent — LLM call is never affected"
  - trigger: "llm-client throws LlmError"
    impact: "No CallRecord captured (no usage data available). Error propagated to caller."
    propagation: "propagated"
  - trigger: "config.disabled = true"
    impact: "instrumentClient() returns the original LlmClient unwrapped. Zero overhead."
    propagation: "n/a"

performance:
  critical_path_overhead_target: "<2ms"
  notes: >
    All call types: buildAfterCallDispatch() executes synchronously post-response/stream.
    dispatchWithRetry fires async (fire-and-forget). No blocking ingestion on critical path.
    Streaming paths add a single async iteration layer for usage accumulation. Negligible overhead.

notes: |
  v1.0.0: instrumentClient() wraps complete(), stream(), structured() — bespoke per-method closures.
  v1.1.0: cost propagation — CallRecord.cost when llm-pricing peer dep is installed.
  v1.2.0: requestedModel on CallRecord when provider failover fires in llm-client.
  v1.3.0: streamStructured() usage capture — one CallRecord per call, from done event.
  v1.4.0: B1-hybrid internal refactor. Non-streaming paths use shared buildAfterCallHandler()
          via llm-client hooks. Stream wrappers retained pending LlmAfterCallContext.usage.
          Public API 100% unchanged.
  v2.0.0: Architecture-migration complete. All 5 call types route through a single
          buildAfterCallDispatch() function. Bespoke stream wrappers deleted.
          Requires llm-client@^1.6.0. Public API unchanged.
  v3.0.x: peer-dep cleanup — @diabolicallabs/llm-pricing removed from peerDependencies.
          LlmCost inlined in types.ts. Prevents Changesets peer-cascade major bumps.
  v3.1.0: pluggable logger — setAgentSdkLogger() added; structured JSON stdout default.
          Aligns with llm-client and llm-pricing pluggable logger convention.
  v3.2.0: UUID validation at startup — instrumentClient() validates identity.agentId and
          identity.projectId at call time; non-UUID values flip to no-op mode with console.warn.
  v3.2.2: peer-dep bump to llm-client@^5.0.0 (LlmToolSchema breaking tool inputSchema change).
  v3.2.3: files namespace passthrough — InstrumentedLlmClient.files delegates to the underlying
          LlmClient.files so callers can use the Files API without unwrapping the client.
  v3.2.4: dependency bump — tracks llm-client@5.2.0 (gemini-3.5-flash capability
          registration). No API or behavior change.
  CallRecord shape is the ingestion contract with the Agent Spend Dashboard — do not change
  without coordinating with the Dashboard brief.
  In-memory queue deferred to v0.2 — direct dispatch with retry covers 99% of transient
  failures without background-worker teardown complexity.
