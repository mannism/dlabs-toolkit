name: Release

on:
  push:
    branches: [main]

concurrency:
  # Only one release job at a time on main. This prevents two simultaneous
  # Changesets actions from colliding on version bumps.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version and Publish
    runs-on: ubuntu-latest
    permissions:
      # Required for changesets/action to create GitHub Releases and push
      # the version-bump commit back to main.
      contents: write
      # Required for changesets/action to list, create, and update the
      # "Version Packages" PR via the GitHub pull requests API.
      pull-requests: write
      # Required for OIDC token issuance — enables npm provenance attestations
      # when publishing packages (future-proofs against npm registry requirements).
      id-token: write
      # Required to publish packages to GitHub Packages.
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history needed for Changesets to detect which packages changed
          fetch-depth: 0

      - name: Setup pnpm
        # No version pin — pnpm/action-setup@v6 reads from packageManager in package.json
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          # Authenticate against GitHub Packages for publishing
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        # Packages must be built before Changesets can publish them.
        # Turborepo handles topological order.
        run: pnpm turbo run build
        env:
          TURBO_TELEMETRY_DISABLED: 1

      - name: Create Release PR or Tag
        # changesets/action does one of two things on each main push:
        # 1. If changeset files are present: opens/updates a "Version Packages" PR
        #    that bumps versions, updates CHANGELOG.md files, and removes the
        #    changeset files. No release yet.
        # 2. If the "Version Packages" PR is merged (no changeset files remain):
        #    runs `pnpm release` (which calls `changeset tag`) to create git tags
        #    and GitHub Releases. No registry publish — tag-only stopgap until
        #    @diabolicallabs org is registered on npmjs.com and NPM_TOKEN is set.
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
