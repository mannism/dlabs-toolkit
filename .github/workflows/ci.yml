name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**', 'refactor/**']
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-progress CI runs on the same branch/PR when a new push arrives.
  # This avoids queuing redundant runs on rapid pushes.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck / Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # No version pin here — pnpm/action-setup@v6 reads the version from
        # packageManager field in root package.json (pnpm@9.15.0). Specifying
        # both causes ERR_PNPM_BAD_PM_VERSION on action-setup@v4.
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        # --frozen-lockfile: fail if pnpm-lock.yaml would change.
        # Catches cases where a developer committed package.json changes
        # without committing the corresponding lockfile update.
        run: pnpm install --frozen-lockfile

      - name: Run pipeline (typecheck, lint, build, test)
        # Turborepo runs tasks in topological order with remote cache enabled.
        # TURBO_TOKEN + TURBO_TEAM activate the Vercel remote cache — cache hits
        # skip unchanged packages entirely. On second run of an identical commit,
        # all tasks should be replayed from cache (0 actual work).
        # agent-sdk builds after llm-client; all other packages run in parallel.
        run: pnpm turbo run typecheck lint build test
        env:
          # Turbo remote cache credentials (stored in GitHub Actions secrets)
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          # Disable Turbo telemetry in CI
          TURBO_TELEMETRY_DISABLED: 1

      - name: Run coverage (CI gate — 80% required)
        # Run coverage separately from the Turbo pipeline so that:
        # 1. Coverage failures are clearly reported as a separate step
        # 2. Turbo can cache the test run; coverage does not participate in the cache
        # Each package runs vitest with --coverage flag. Thresholds are in vitest.config.ts.
        run: |
          pnpm --filter @diabolicallabs/llm-client exec vitest run --coverage
          pnpm --filter @diabolicallabs/agent-sdk exec vitest run --coverage
          pnpm --filter @diabolicallabs/notion exec vitest run --coverage
          pnpm --filter @diabolicallabs/rate-limiter exec vitest run --coverage

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Run audit independently so a failing typecheck doesn't mask a CVE.
    # Both jobs must pass for the PR to be mergeable.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        # Fail on high or critical severity vulnerabilities.
        # Use --audit-level high — medium/low are tracked by Dependabot.
        # Accepted-risk advisories (medium, dev-tooling only, no runtime exposure):
        #   - GHSA-h67p-54hq-rp68 (js-yaml < 4.2.0) via @changesets/cli >
        #     @manypkg/get-packages > read-yaml-file@1.x. Cannot override
        #     js-yaml to 4.2.0 because read-yaml-file@1.x calls removed safeLoad().
        #     Upstream tracking: bump @changesets/cli when it ships with
        #     read-yaml-file@2.x. Review by 2026-09-16.
        run: pnpm audit --audit-level high
